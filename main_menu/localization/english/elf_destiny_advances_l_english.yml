l_english:
 elven_lore: "Elven Lore"
 elven_lore_desc: "Wisdom from the elder days, ancient as civilization itself."

 beast_tamers: "Beast Tamers"
 beast_tamers_desc: "Domesticating and breeding beasts, carefully crafting powerful and loyal creatures that act as extensions of their masters."

 elven_artisanship: "Elven Artisanship"
 elven_artisanship_desc: "Elven artisans are renowned for their skill and perfection of detail. Their works are highly sought after, and their craftsmen in high demand."

 mythril_working: "Mythril Working"
 mythril_working_desc: "Mythril, the legendary metal desired even by the Valar themselves. Knowledge of how to craft with this metal is extremely rare even among Elven Masters. More common among Dwarves but where is one going to find one of them these days?"

 forest_dominion: "Forest Dominion"
 forest_dominion_desc: "The Elves are the masters of the forest, and their connection to nature is unparalleled. Some say that the trees themselves whisper secrets to the Elven ear, and that the animals of the forest are their loyal subjects.

 herbal_mastery: "Herbal Mastery"
 herbal_mastery_desc: "The Elves have an intimate knowledge of the flora of the world, and their herbal remedies are renowned for their potency and effectiveness. They can cure diseases, heal wounds, and even extend life with their herbal concoctions."

 level_2_magic: "Refined Spark Weaving"
 level_2_magic_desc: "Spark is but a club when handled by brutes, but in the hands of a skilled Elven mage, it can be woven into intricate patterns of power."

 grand_portal_restored: "The Grand Portal Restored"
 grand_portal_restored_desc: "The Grand Portal must be restored to strengthen the [ShowGodName('the_divine_spark')]'s influence in this world and reconnect Earth to the countless other realms of the universe.#!#color_light_gray \n\nTo restore The Grand Portal:\n$BULLET_WITH_TAB$Use [ruler|e]'s' [ShowCharacterInteractionName('fund_expedition')] [character_interaction|e] to find:\n  $BULLET_WITH_TAB$a #high Spark Capacitor#! artifact\n  $BULLET_WITH_TAB$a #high Navigation Relay#! artifact\n$BULLET_WITH_TAB$Pass a [ShowParliamentIssueTypeName('restore_portal')] [parliament_issue|e]#!"

 level_3_magic: "Crystalic Amplification"
 level_3_magic_desc: "The Elves have mastered the art of amplifying their magics by storing Spark through the use of crystalic objects and structures."

 level_4_magic: "Ambient Spark Harvesting"
 level_4_magic_desc: "The Elves have developed techniques to harvest the ambient Spark that permeates the world, allowing them to draw power from the very fabric of reality itself."

 level_5_magic: "Archonic Rituals"
 level_5_magic_desc: "The Elves have uncovered ancient rituals that allow them to tap into the power of the Archons, granting them immense magical abilities and insights into the nature of the universe."

 level_6_magic: "Divine Avatars"
 level_6_magic_desc: "The Elves have achieved a level of mastery over Spark that allows them to manifest avatars of the divine, channeling the power of the gods themselves to achieve incredible feats."

 level_2_war: "Elite Elven Tactics"
 level_2_war_desc: "The Elves have honed their martial skills and tactics to a fine edge, allowing them to outmaneuver and outfight their enemies on the battlefield."

 level_3_war: "Elven Martial Supremacy"
 level_3_war_desc: "The Elves have achieved a level of martial mastery that allows them to dominate the battlefield with superior tactics and combat skills."

 honor_of_the_fay: "Honor of the Fay"
 honor_of_the_fay_desc: "The Elves have a strict chivalric code of honor that governs their behavior. This code emphasizes respect for nature, loyalty to one's kin, and the pursuit of excellence in all things."

 found_elven_portal_artifact_1: "Found a Spark Capacitor on an Expedition"
 found_elven_portal_artifact_2: "Found a Navigation Relay on an an Expedition"
 passed_restore_portal_through_parliament: "Passed the [ShowParliamentIssueTypeName('restore_portal')] [parliament_issue|e]"

 go_on_expeditions: "\nAncient Elven knowledge can be rediscovered by using the [ShowCharacterInteractionName('fund_expedition')] [character_interaction|e] on your country's [ruler|e]"
 discovered_people_of_the_bow_tradition: "#high Discovered:#! The forgotten honor code of the people of the bow. $go_on_expeditions$"
 discovered_beast_tamers_tradition: "#high Discovered:#! The lost practice of beast taming. $go_on_expeditions$"
 discovered_mythril_working_tradition: "#high Discovered:#! The lost practice of mythril working. $go_on_expeditions$"
 grand_portal_has_been_restored: "The Grand Portal has been restored, and the ambient Spark in the world has increased"
 cant_yet_enter_god_tier: "The method of Ascending to the ranks of the Ainur is known by very few. It is said one must first be chosen by the Divine Spark itself! \n\n#D It is also rumored by the dev that there is not currently anyway to reach this tier yet! Keep an eye out for a future patch! (or use the character editor)#!"

 ruler_is_fae_tier_or_higher: "This country's [ruler|e] must ascend to [ShowTraitName('elf_tier_4')] or higher"
 ruler_is_celestial_tier_or_higher: "This country's [ruler|e] must ascend to [ShowTraitName('elf_tier_7')] or higher"
