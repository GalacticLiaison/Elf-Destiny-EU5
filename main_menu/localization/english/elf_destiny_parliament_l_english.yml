 restore_portal: "#color_highlight Restore The Grand Portal#!"
 restore_portal_desc: "I have learned a great truth of man's history. \n\nBy collecting ancient components, re-discovering lost knowledge, and hunting down the lost seal of a long dead king, I could reforge the Grand Portal and restore our connection to the stars, our ancestors, and the unfathomable dangers of the unknown.\n\nI should not take such a decision lightly..."
