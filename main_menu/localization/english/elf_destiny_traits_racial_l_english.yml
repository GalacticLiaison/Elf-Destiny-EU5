l_english:
 racial_trait: "[racial_trait|e]"

 human: "Human"
 human_die_desc: ""
 desc_human: "The Human race is the most numerous and populous form of being in this world. They are severed from The Divine Spark--They receive not its power nor feel its influence"
 elf_tier_1: "Elf Blood"
 elf_tier_1_die_desc: ""
 desc_elf_tier_1: "The result of Elves breeding with humans. An Elf Blooded is still an Elf, albeit of little power, and may still walk the path of Ascension"
 elf_tier_2: "Elf"
 elf_tier_2_die_desc: ""
 desc_elf_tier_2: "The most common form of Elf in all the realms. Although superior to the humans they sit at the bottom rungs of Ascension and Elven society"
 elf_tier_3: "High Elf"
 elf_tier_3_die_desc: ""
 desc_elf_tier_3: "An Elf who has taken the first true step of Ascension and stands above their peers in both grace and power"
 elf_tier_4: "True Elf"
 elf_tier_4_die_desc: ""
 desc_elf_tier_4: "An Elf that has passed the first major gateway of Ascension. Their bodies and souls have both been greatly purified"
 elf_tier_5: "Fae"
 elf_tier_5_die_desc: ""
 desc_elf_tier_5: "Elves that have undergone a transformative milestone of Ascension. They attuned to a higher alignment with the Divine Spark and thus may wield greater magics."
 elf_tier_6: "Fae Radiant"
 elf_tier_6_die_desc: ""
 desc_elf_tier_6: "Legendary Fae of incredible power. Their noble grace makes their right to rule clear to all."
 elf_tier_7: "Celestial"
 elf_tier_7_die_desc: ""
 desc_elf_tier_7: "Elves of a divine quality. Their Ascension has bestowed upon them the ability to walk the realms most densely filled with the Divine Spark's influence."
 elf_tier_8: "Seraphic Celestial"
 elf_tier_8_die_desc: ""
 desc_elf_tier_8: "Elves that have reached a near angelic state of being."
 elf_tier_9: "Vanyar"
 elf_tier_9_die_desc: ""
 desc_elf_tier_9: "The high chosen people of the Gods and the pinnacle of common Ascension."
 elf_tier_10: "Maia"
 elf_tier_10_die_desc: ""
 desc_elf_tier_10: "Demi-god servants of the Valar, and the lowest rung of the Ainur."
 elf_tier_11: "Vala"
 elf_tier_11_die_desc: ""
 desc_elf_tier_11: "Mighty Gods of the Divine Spark."
 elf_tier_12: "Aratar"
 elf_tier_12_die_desc: "."
 desc_elf_tier_12: "The most powerful chosen few among the Valar."