 calaquendi_high_magi: "Calaquendi High Magi"
 calaquendi_high_magi_desc: "The most powerful magi of Elven society, the Calaquendi. They are revered as the pinnacle of magical prowess and are often called upon to lead armies and defend the realm with their formidable magic."

