 mythril_plated_fey_vanguard: "Mythril Plated Fey Vanguard"
 mythril_plated_fey_vanguard_desc: "Elite Elven warriors clad in mythril armor, the Fey Vanguard are known for their resilience and combat prowess. They serve as the frontline defenders of Elven forces, capable of withstanding heavy attacks while delivering powerful strikes against their enemies."
 mythril_plated_horse_masters: "Mythril Plated Horse Masters"
 mythril_plated_horse_masters_desc: "Elite Elven cavalry units clad in mythril armor that ride on the backs of armored horses. They are known for their speed, mobility, and ability to quickly respond to threats across the battlefield."