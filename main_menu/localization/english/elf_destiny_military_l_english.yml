 a_age_1_aeluran_magi: "Aeluran Magi"
 a_age_1_aeluran_magi_desc: "Sisters of the Aeluran Order, these magi are trained in the fundamentals of war magic and act as the backbone of the Aeluran forces."

 a_age_2_aeluran_magi: "Adept Aeluran Magi"
 a_age_2_aeluran_magi_desc: "These Aeluran Magi have advanced their training and are now more skilled in the use of war magic."

 a_age_3_aeluran_magi: "Veteran Aeluran Magi"
 a_age_3_aeluran_magi_desc: "These Aeluran Magi have gained extensive experience in battle and are highly effective in combat."

 a_age_4_aeluran_magi: "Elite Aeluran Magi"
 a_age_4_aeluran_magi_desc: "These Aeluran Magi are the most skilled and powerful of their kind, capable of wielding devastating magic in battle."

 a_age_5_aeluran_magi: "Royal Aeluran Magi"
 a_age_5_aeluran_magi_desc: "These Aeluran Magi are chosen by the Elven royalty to serve as their personal guardians and war mages."

 a_age_6_aeluran_magi: "Ascendant Aeluran Magi"
 a_age_6_aeluran_magi_desc: "These Aeluran Magi have transcended the normal bounds of mortal magic, becoming almost divine in their power and influence."

