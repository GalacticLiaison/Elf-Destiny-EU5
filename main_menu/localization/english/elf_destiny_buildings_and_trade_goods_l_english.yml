l_english:
 mythril: "Mythril"
 mythril_desc: "Mythril, the legendary metal desired even by the Valar themselves. Knowledge of how to craft with this metal is extremely rare even among Elven Masters. More common among Dwarves but where is one going to find one of them these days?"
 lembas: "Lembas"
 lembas_desc: "Lembas, the Elven waybread, is a highly nutritious and sustaining food that can keep a traveler going for days on end with just a small bite. It is said that even the smallest crumb of lembas can provide enough energy to sustain a person for an entire day."
 elven_crafts: "Elven crafts"
 elven_crafts_desc: "Elven crafts are renowned for their beauty, intricacy, and functionality. From finely crafted weapons and armor to delicate jewelry and intricate tapestries, Elven artisans have a long tradition of creating works of art that are both beautiful and practical."
 mythril_elven_crafts: "Mythril Elven Crafts"
 mythril_elven_crafts_desc: "Mythril Elven Crafts are the pinnacle of Elven craftsmanship, combining the legendary properties of mythril with the artistic skill of Elven artisans."

