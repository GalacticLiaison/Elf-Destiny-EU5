 mallorn_tree_grove: "Mallorn Tree Grove"
 mallorn_tree_grove_desc: "$recieve_greater_blessing$#emp #color_gray A grove of majestic Mallorn trees, whose golden leaves and silver bark are a symbol of the beauty and resilience of the Elven people. The grove is a place of tranquility and inspiration, where Elven artists and poets often seek solace and creativity.#!#!"
 baths_of_starlight: "Baths of Starlight"
 baths_of_starlight_desc: "$recieve_greater_blessing$#emp #color_gray The Baths of Starlight are a luxurious and serene retreat for the Elven elite, where they can relax and rejuvenate under the gentle glow of starlight. The baths are said to have healing properties, and many Elves believe that soaking in the waters can enhance their connection to the divine.#!#!"
 perfume_garden_of_valinor: "Perfume Garden of Valinor"
 perfume_garden_of_valinor_desc: "$recieve_greater_blessing$#emp #color_gray The Perfume Garden of Valinor is a lush and fragrant oasis, filled with exotic flowers and plants that produce some of the most exquisite scents in the world. The garden is tended by skilled Elven perfumers, who use the rare and precious ingredients to create perfumes that are highly sought after by the Elven elite and beyond.#!#!"
 wine_cellar_of_elder_days: "Wine Cellar of Elder Days"
 wine_cellar_of_elder_days_desc: "$recieve_greater_blessing$#emp #color_gray The Wine Cellar of Elder Days is a vast and ancient cellar that holds the finest wines from across the ages. Some wines are said to have been blessed by the Valar themselves, and many Elves believe that drinking from the cellar can grant them visions of the past and insights into the future.#!#!"
 feasting_hall_of_the_trees: "Feasting Hall of the Trees"
 feasting_hall_of_the_trees_desc: "$recieve_greater_blessing$#emp #color_gray The Feasting Hall of the Trees is a grand and magnificent hall built among the Mallorn trees. It is a place where Elven nobles gather to celebrate their victories, honor their ancestors, and share stories of their exploits."
 grand_archives: "Grand Archives"
 grand_archives_desc: "$recieve_greater_blessing$#emp #color_gray The Grand Archives are a vast repository of knowledge and wisdom, containing the accumulated lore and history of the Elven people. They are maintained by the most learned Elven scholars and scribes.#!#!"

 recieve_greater_blessing: "#!#high Country receives a [ShowModifier('greater_religious_influence_bonus')] upon completion#!\n\n"

 grand_portal_ruins: "Grand Portal Ruins"
 grand_portal_ruins_desc: "The Grand Portal, a mysterious and ancient structure that once served as a gateway between worlds, now lies in ruins. It is said that that it holds the key to unlocking the full potential of the [ShowGodName('the_divine_spark')]'s influence in this world. Could such a wonder ever be restored?"
 grand_portal: "The Grand Portal"
 grand_portal_desc: "The Grand Portal, a mysterious and ancient structure that once served as a gateway between worlds, has been restored to its former glory. With the Grand Portal restored, the [ShowGodName('the_divine_spark')]'s influence in this world has been strengthened, and Earth is now reconnected to the countless other realms of the universe."

 seat_of_the_fey_lord_maintenance: "Seat of the Fey Lord Maintenance"
