 seat_of_the_fey_lord: "Seat of the Fey Lord"
 seat_of_the_fey_lord_desc: "The throne of the Fey Lord is the seat of the Elven ruler, a symbol of their authority and connection to the divine."
 sanctum: "Sanctum"
 sanctum_desc: "The primary residence of the Calaquendi, a sacred place where the Elven elite dwell and conduct their affairs."
