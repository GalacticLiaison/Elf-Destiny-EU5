l_english:
 fund_expedition: "Fund Expedition"
 fund_expedition_desc: "Expeditions are about rediscovering the secrets of the ancient Elven peoples.\n\nA party of adventurers will explore Elven ruins in search of long lost knowledge and great treasures."
 fund_expedition_desc_specific: "Expeditions are about rediscovering the secrets of the ancient Elven peoples.\n\nA party of adventurers will explore Elven ruins in search of long lost knowledge and great treasures. They may discover \n$BULLET_WITH_TAB$Valuable treasures worth [gold|e]\n$BULLET_WITH_TAB$[research|e] progess from peculiar artifacts\n$BULLET_WITH_TAB$[religious_influence|e] from lost relics\n$BULLET_WITH_TAB$Unique Elven [advances|e] and [government_reforms|e]\n$BULLET_WITH_TAB$and more!"
 fund_expedition_act: "Fund Expedition act"
 fund_expedition_act_past: "The expedition has been funded and the supplies for the journey are being gathered."
 fund_expedition_past: "Expedition Funded!"
 fund_expedition_concept: "Send a party to explore ancient Elven ruins"
 expedition_price: "Expedition Price"
 elf_destiny_expedition.1.title: "Elven Ruin Expedition - Choose a Leader"
 elf_destiny_expedition.1.desc: "The preparations are complete and the Ancient Elven ruins beckon. All thats left is to assign a worthy leader of this endeavor. Who will you choose to lead the expedition?\n\n#high Tip:#! Characters that possess [explorer|e] [traits|e] and high @adm! [adm|e] skill will have a better chance of success on expeditions"
 elf_destiny_expedition.1.a: "Send [char1.GetName]"
 elf_destiny_expedition.1.b: "Send [char2.GetName]"
 elf_destiny_expedition.1.c: "Send [char3.GetName]"
 elf_destiny_expedition.1.d: "Anyone will do" # error fallback

 elf_destiny_expedition.11.title: "Elven Ruin Expedition - Leader Chosen"
 elf_destiny_expedition.11.desc: "\"I am honored by your trust, my liege. I will not fail you.\""
 elf_destiny_expedition.11.a: "Good luck!"

 elf_destiny_expedition.21.title: "Expedition - Progress Made"
 elf_destiny_expedition.21.desc.major: "$expedition_supplies_remaining$You receive a letter correspondence from the expedition leader. \n\n\"My [ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')], our expedition to the Elven ruins has borne fruit. We have uncovered ancient relics and deciphered parts of the Elven script on the map. We are close to discovering something of great importance, I can feel it.\""
 elf_destiny_expedition.21.desc.minor: "$expedition_supplies_remaining$You receive a letter correspondence from the expedition leader. \n\n\"My [ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')], our expedition to the Elven ruins has made some progress. We have uncovered a few relics and deciphered small parts of the Elven script on the map. Our findings suggest we are on the right path.\""
 elf_destiny_expedition.21.a: "Excellent news!"

 elf_destiny_expedition.22.title: "Expedition - Progress Lost"
 elf_destiny_expedition.22.desc.critical: "$expedition_supplies_remaining$A letter from the expedition leader arrives, the bearer who delivered it is reported to have suffered great injuires and died shorty after. The letter is smeared with blood and difficult to read. \n\n\"They have taken the bridge and the Second Hall. We have barred the gates but cannot hold them for long. The ground shakes... drums, drums in the deep. We cannot get out. The shadow moves in the dark. We cannot get out. They are coming.\"\n It would seem the expedition has met a terrible fate. [recipient.GetName] and all of their party are presumed dead."
 elf_destiny_expedition.22.desc.major: "$expedition_supplies_remaining$You receive a letter correspondence from the expedition leader. \n\n\"My [ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')], misfortune has befallen our expedition to the Elven ruins. A sudden storm destroyed much of our equipment and supplies, setting us back considerably. We will need to regroup and recover before we can continue our search."
 elf_destiny_expedition.22.desc.minor: "$expedition_supplies_remaining$You receive a letter correspondence from the expedition leader. \n\n\"My [ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')], unfortunate events have hindered our expedition to the Elven ruins. A band of marauders ambushed us, stealing some of our supplies and damaging our equipment. We have lost valuable time and will need to recover before proceeding."
 elf_destiny_expedition.22.a: "I see..."
 elf_destiny_expedition.22.b: "May their souls find peace..."
 elf_destiny_expedition.22.c: "..."
 minor_expedition_success_text: "The expedition has made #G Minor#! progress."
 major_expedition_success_text: "The expedition has made #G Major#! progress!"
 minor_expedition_failure_text: "The expedition has lost #R Minor#! progress."
 major_expedition_failure_text: "The expedition has lost #R Major#! progress!"
 critical_expedition_failure_text: "#R The expedition has ended in disaster#!"

 minor_expedition_success_tooltip: "\n\n$minor_expedition_success_text$"
 major_expedition_success_tooltip: "\n\n$major_expedition_success_text$"
 minor_expedition_failure_tooltip: "\n\n$minor_expedition_failure_text$"
 major_expedition_failure_tooltip: "\n\n$major_expedition_failure_text$"
 critical_expedition_failure_tooltip: "\n\n$critical_expedition_failure_text$"

 expedition_supplies_increased_1: "Expedition supplies increased by 1 month"
 expedition_supplies_remaining: "#yellow_titles Expedition supplies remaining:#! [SCOPE.GetValue('expedition_supplies')] months\n"

 elf_destiny_expedition.230.title: "Expedition - Aid requested"
 elf_destiny_expedition.230.desc: "$expedition_supplies_remaining$You receive a letter correspondence from the expedition leader. \n\n\"My [ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')], unfortunate events have hindered our expedition to the Elven ruins. A great many of our party have been lost to plague. Our progress will be greatly slowed if we can not find more men to replace them.\"\n\n How will you respond?"
 elf_destiny_expedition.230.send: "Send more men"
 elf_destiny_expedition.230.dontSend: "They will just have to make due"

 elf_destiny_expedition.231.title: "Expedition - Aid requested"
 elf_destiny_expedition.231.desc: "$expedition_supplies_remaining$You receive a letter correspondence from the expedition leader. \n\n\"My [ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')], unfortunate events have hindered our expedition to the Elven ruins. The locals of the area are quite upset with us disturbing the site. Im afraid if we dont do something it may come to violence.\"\n\n How will you respond?"
 elf_destiny_expedition.231.ignore: "Ignore the locals"
 elf_destiny_expedition.231.diplo: "Send diplomats to calm the locals"
 elf_destiny_expedition.231.gold: "Send gold to buy the locals loyalty and secure supplies"

 elf_destiny_expedition.232.title: "Expedition - Aid requested"
 elf_destiny_expedition.232.desc: "$expedition_supplies_remaining$You receive a letter correspondence from the expedition leader. \n\n\"My [ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')], unfortunate events have hindered our expedition to the Elven ruins. As we have excavated the site we have discovered an ancient burial site stands in our way. Removing it would be sacrilege, but digging around it would set us back months\"\n\n How will you respond?"
 elf_destiny_expedition.232.dig: "Dig through the bones!"
 elf_destiny_expedition.232.dontDig: "Do not blaspheme!"
 
 elf_destiny_expedition.3.title: "Expedition Success!"
 elf_destiny_expedition.3.desc.standard: "The expedition has returned and you receive [recipient.GetName] and their party bearing wondrous Elven artifacts and relics. \n\n\"My [ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')], our expedition to the Elven ruins has been a success!\""
 elf_destiny_expedition.3.desc.special: "\n\"We found something special there among the rest\", [recipient.GetName] says, presenting to you an ornate chest."
 elf_destiny_expedition.3.desc.research: "\n\"Among the relics we found was an ancient Elven tome. Its pages are filled with knowledge long lost to time. I believe it holds secrets that could greatly advance our understanding of the world.\""
 elf_destiny_expedition.3.desc.religious: "\n\"Among the relics we found was an ancient Elven idol, depicting a mighty Valar. Its presence radiates a divine energy. I believe it holds a connection to the Divine Spark.\""
 open_special_chest_tooltip: "You open the chest"
 elf_destiny_expedition.3.a: "Excellent work! Our understanding of the ancient Elves grows."
 elf_destiny_expedition.3.b: "What's in the box!?"

 elf_destiny_expedition.31.title: "A Resonance of The Divine Spark"
 elf_destiny_expedition.31.desc: "You open the ornate chest to find "
 elf_destiny_expedition.31.desc.people_of_the_bow: "a bow of unknown lumber and impressive craftsmanship. "
 elf_destiny_expedition.31.desc.beast_tamers: "a book labeled The Royal Menagerie's Bestiary and Husbandry Guide Third Edition. "
 elf_destiny_expedition.31.desc.mythril_working: "A collection of intricate metal tools, perhaps from a smithy. "
 elf_destiny_expedition.31.desc.close: "It radiates a faint, otherworldly glow. You can feel the Divine Spark's presence within it, suggesting a deep connection between the ancient Elves and this mysterious artifact.\n\nAn urge to reach out and touch it overcomes you. You instinctively know that you could gain lost knowledge by connecting with it. What will you do?"
 elf_destiny_expedition.31.a: "Touch the artifact"
 elf_destiny_expedition.31.b: "Close the chest"

 elf_destiny_expedition.321.title: "The Grand Portal: Spark Capacitor"
 elf_destiny_expedition.321.desc: "You have recovered a vital component needed to restore the Grand Portal. This piece is intricately crafted and hums with latent energy. With this, we are one step closer to reopening the gateway for the Elven people to return."
 elf_destiny_expedition.321.a: "A wondrous discovery!"

 elf_destiny_expedition.322.title: "The Grand Portal: Navigation Relay"
 elf_destiny_expedition.322.desc: "You have recovered a vital component needed to restore the Grand Portal. This piece is intricately crafted and hums with latent energy. With this, we are one step closer to reopening the gateway for the Elven people to return."
 elf_destiny_expedition.322.a: "A wondrous discovery!"

 elf_destiny_expedition.33.title: "A Mysterious Elixir"
 elf_destiny_expedition.33.desc: "Laying in the chest is a small vial containing a shimmering liquid. The expedition leader explains that this elixir was found in a hidden chamber within the ruins, he is unsure of its properties. Your not sure its wise to drink strange liquids and Elven potions are infamous for their unpredictable effects. Perhaps the local alchemists would be willing to pay good coin for it.\n\nWhat will you do?"
 elf_destiny_expedition.33.a: "Drink it!"
 elf_destiny_expedition.33.b: "Sell it"

 elf_destiny_expedition.331.title: "Down the Hatch"
 elf_destiny_expedition.331.desc: "You uncork the vial and drink the shimmering liquid.\n\n"
 elf_destiny_expedition.331.desc.stat_boosts: "You feel invigorated, your senses sharpened, and a newfound clarity of mind. It seems the elixir has enhanced your mental capabilities."
 elf_destiny_expedition.331.desc.extend_life: "You feel a surge of energy and vitality coursing through your veins. Your lifespan has been extended, granting you additional years of life!"
 elf_destiny_expedition.331.desc.stat_penalties: "Almost immediately, you feel a wave of dizziness and nausea. Your head throbs painfully, and you struggle to maintain your balance. It seems the elixir has had adverse effects on your mental health."
 elf_destiny_expedition.331.desc.trait_positive: "Your skin tingles as a warm sensation spreads through your body. You can feel your body shifting and changing, enhancing you. It seems the elixir has bestowed upon you a new genetic trait. How wondrous!"
 elf_destiny_expedition.331.desc.trait_negative: "A cold shiver runs down your spine as an unsettling sensation takes hold. You feel a strange transformation occurring within you, altering your very being. It seems the elixir has imposed upon you a detrimental genetic trait."
 elf_destiny_expedition.331.a: "#color_green *belch*#!"

 gained_beauty_good_2_trait_tooltip: "Gained a genetic trait"
 gained_physique_good_2_trait_tooltip: "Gained a genetic trait"
 gained_intellect_good_2_trait_tooltip: "Gained a genetic trait"
 gained_fecund_trait_tooltip: "Gained a genetic trait"
 gained_beauty_bad_2_trait_tooltip: "Gained a genetic trait"
 gained_physique_bad_2_trait_tooltip: "Gained a genetic trait"
 gained_intellect_bad_2_trait_tooltip: "Gained a genetic trait"

 elf_destiny_expedition.4.title: "Expedition Failed"
 elf_destiny_expedition.4.desc: "The expedition has ran out of supplies and returned empty-handed.\n\n\"I have failed you my [ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')]. Forgive me\""
 elf_destiny_expedition.4.a: "How disappointing."