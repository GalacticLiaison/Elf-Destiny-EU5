l_english:
 ascension_base_price: "Ascension Base Price"
 ascension_events.1.title: "Prepare for Ascension"
 ascension_events.1.desc.solo: "You have accumulated enough divine power to Ascend to a higher state of being. Communing with the Divine Spark is a profound experience, are you ready to take the next step in your destiny?"
 ascension_events.1.desc.family: "Your thoughts dwell on your family, why should you Ascend alone when you can share the experience with your loved ones by acting as their guide in the ritual for a modest additional cost to your power?"
 ascension_events.1.default: "Ascend"
 ascension_events.1.solo: "Ascend Alone"
 ascension_events.1.family: "Ascend With Family"
 ascension_events.1.desc.cant_afford_family: "\n\n#r You do not have enough #high ([SCOPE.GetValue('family_ascension_price')||2])#! [religious_influence|e] to Ascend with your family"
 ascension_events.1.changed_my_mind: "I've changed my mind, I need to think upon this more."

 you_ascend_alone: "You will Ascend alone"
 you_ascend_with_all_immediate_family_members: "You will Ascend with every close relative in [ROOT.Country.GetName]"

 ascension_events.11.title: "Divine Communion"
 ascension_events.11.desc.solo: "You retreat to your chambers and begin your meditations. A familiar presence can be felt and you know the Divine Spark has cast its gaze upon you. You sense its judgement and then approval as power flows around you. Elation fills your heart as you undergo a profound transformation."
 ascension_events.11.desc.family: "You retreat to your chambers with your family. You join hands as you begin your meditations. A familiar presence can be felt and you know the Divine Spark has cast its gaze upon you. You sense its judgement and then approval as power flows around you. Elation fills your heart as you undergo a profound transformation together with your family."
 ascension_events.11.a: "Unlimited Power!"

 ascension_events.12.title: "You Have Ascended!"
 ascension_events.12.desc: "You have become more aligned with the Divine Spark, and your Elf Trait has evolved! You have become a [race_trait.GetName]!"
 ascension_events.12.desc.family: "Your family has become more aligned with the Divine Spark, and your Elf Traits have evolved! You have become a [race_trait.GetName]!"
 ascension_events.12.desc.major_threshold_reached_fae_tier: "You have crossed a major threshold of Ascension and are now a #color_royal_purple Fae Tier#! Elf!"
 ascension_events.12.desc.major_threshold_reached_celestial_tier: "You have crossed a major threshold of Ascension and are now a #color_goldy_yellow Celestial Tier#! Elf!"
 ascension_events.12.a: "I have become #yellow_titles more#!! Huzzah!"
 ascension_events.12.desc.elf_level_display: "\n\n\n\n\n                       #credits_studio [portrait_1.Custom('AscensionResult')]#!"

 ascended_to_elf_tier_2: "@elf_tier_1! @blue_right! @elf_tier_2!"
