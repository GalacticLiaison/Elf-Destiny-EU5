 receive_blessing: "Ritual of The Divine Spark's Blessing"
 receive_blessing_desc: "You have accumulated enough good will with the Divine Spark to seek a blessing from it!\n\nRetreat to your chambers and begin your meditations."
 blessing_base_price: "Blessing Base Price"

 ascension_events.2.title: "Ritual of The Divine Spark's Blessing"
 ascension_events.2.desc: "As you meditate, a familiar presence can be felt and you know the Divine Spark has cast its gaze upon you. Once again, you see countless possibilities flash before your eyes, fading just as quickly, leaving a single idea in their shadow.\n\n #yellow_titles \"Choose\"#!"
 the_rut_blessing_option: "My people will multiply across the land!"
 beguiling_nature_blessing_option: "Our grace shall ensnare lesser mortals!"
 heroic_courage_blessing_option: "We shall always stand tall! May our enemies cower!"
 noble_husbandry_blessing_option: "Our bloodlines will be without equal!"
 familial_familiarity_blessing_option: "The bonds of our family shall be strong as steel!"
 mythril_blessing_option: "My lands will be rich beyond measure!"
 no_blessing_available: "No more blessings available"

 ascension_events.21.title: "Divine Judgement"
 ascension_events.21.desc: "#high . . .#!\n\nA familiar presence can be felt and you know the Divine Spark has cast its gaze upon you. You feel a strange emotion from it you haven't experienced before... it feels... judgemental?"
 ascension_events.21.a: "Stand in silence."

 ascension_events.211.title: "Divine Judgement"
 ascension_events.211.desc: "#high . . .  . . .#!"
 ascension_events.211.a: "Continue standing in silence."

 ascension_events.212.title: "Divine Judgement"
 ascension_events.212.desc: "#high . . .  . . .  . . . #yellow_titles *sigh*#!"
 ascension_events.212.a: "p...praise the Spark.."

 ascension_events.22.title: "A Blessing of Wealth"
 ascension_events.22.desc: "A great bright beam of Spark centered upon [selected_location.GetName] descends from the sky. An astonishing spectacle that can be seen for many miles. The light eventually vanishes as suddenly it appeared, and the locals don't immediately notice anything amiss. However its not long before reports of a new vein of the legendary metal [ShowGoodsName('mythril')] being discovered there reach the capital.\n\n The Divine Spark has blessed your lands with great riches indeed."
 ascension_events.22.a: "And they call it a mine. A mine!"