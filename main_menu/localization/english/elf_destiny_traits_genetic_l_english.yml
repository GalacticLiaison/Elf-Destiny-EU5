 rule_rarity_of_genetic_traits: "@elf_tier_1! Elf Destiny - Rarity of Genetic Traits"
 setting_genetic_traits_normal_rarity: "@beauty_good_2! Normal Rarity"
 setting_genetic_traits_normal_rarity_desc: "Genetic traits will spawn on new characters at the #high normal rate#!, also effects odds of new borns possessing an uniherited trait. Normal genetic trait inheritance rules are unaffected"
 setting_genetic_traits_more_common: "@beauty_good_3! More Common"
 setting_genetic_traits_more_common_desc: "Genetic traits will spawn on new characters at a #high higher rate#!, also effects odds of new borns possessing an uniherited trait. Normal genetic trait inheritance rules are unaffected"
 setting_genetic_traits_more_rare: "@beauty_good_1! More Rare"
 setting_genetic_traits_more_rare_desc: "Genetic traits will spawn on new characters #high less frequently#!, also effects odds of new borns possessing an uniherited trait. Normal genetic trait inheritance rules are unaffected"