l_english:
 elven_marriage: "Elven Marriage"
 elven_marriage_desc: "Long ago, to better join the great Elf houses together in a time where they faced extinction, the Elves of old adopted the practice of bonding a king with multiple queens."

 consanguinity_law: "Consanguinity Law"
 consanguinity_law_desc: "TODO : Write a desc"
 doctrine_consanguinity_dynastic: "1 - Lineal Prohibition"
 doctrine_consanguinity_dynastic_desc: "It is strictly forbidden to marry another with whom your share a surname and common ancestry, no matter how distantly related, nor is it acceptable to marry those of other surnames proximate through blood."
 doctrine_consanguinity_restricted: "2 - Close-kin Taboo"
 doctrine_consanguinity_restricted_desc: "It is a sin against God to permit two relatives to marry each other or engage in sexual relationships."
 doctrine_parameter_consanguinity_restricted_marriage: "Marriage between any [extended_family_members|E] and/or [close_family_members|E] is forbidden"
 doctrine_consanguinity_cousins: "3 - Cousin Marriage"
 doctrine_consanguinity_cousins_desc: "Cousins may be related, but distantly enough that it is acceptable for them to marry in order to preserve their lineage."
 doctrine_parameter_consanguinity_cousins_marriage: "Marriage between cousins is allowed"
 doctrine_consanguinity_aunt_nephew_and_uncle_niece: "4 - Avunculate Marriage"
 doctrine_consanguinity_aunt_nephew_and_uncle_niece_desc: "As long as they are not directly related, family members are permitted to marry each other for the good of the dynasty."
 doctrine_parameter_consanguinity_aunt_nephew_and_uncle_niece_marriage: "Marriage between cousins, aunts/nephews and uncles/nieces is allowed"
 doctrine_consanguinity_unrestricted: "5 - Unrestricted Marriage"
 doctrine_consanguinity_unrestricted_desc: "It is natural and healthy for family members to love each other, and those who say that love should be restricted to non-sexual relationships are fools.

 marry_dynasty_members: "Arrange a Dynastic Marriage"
