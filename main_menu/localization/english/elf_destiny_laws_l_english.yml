l_english:
 elven_marriage: "Elven Marriage"
 elven_marriage_desc: "Long ago, to better join the great Elf houses together in a time where they faced extinction, the Elves of old adopted the practice of bonding a king with multiple queens."

 consanguinity_law: "Consanguinity Law"
 consanguinity_law_desc: "These laws define which degrees of kinship are allowed to enter into marriage."
 doctrine_consanguinity_dynastic: "@1_consanguinity_law! Lineal Prohibition"
 doctrine_consanguinity_dynastic_desc: "Marriage is strictly banned between anyone who shares the same family name and ancestral line, regardless of how distant the connection may be. Unions with those closely linked by blood, even under different surnames, are likewise considered improper."
 doctrine_consanguinity_restricted: "@2_consanguinity_law! Close-kin Taboo"
 doctrine_consanguinity_restricted_desc: "Allowing relatives to wed or engage in intimate relations is viewed as a grave offense against divine law."
 doctrine_parameter_consanguinity_restricted_marriage: "Marriage between any [extended_family_members|E] and/or [close_family_members|E] is forbidden"
 doctrine_consanguinity_cousins: "@3_consanguinity_law! Cousin Marriage"
 doctrine_consanguinity_cousins_desc: "Though they share blood ties, cousins are considered distant enough in relation that marriage between them is acceptable, particularly when it helps maintain family heritage."
 doctrine_parameter_consanguinity_cousins_marriage: "Marriage between cousins is allowed"
 doctrine_consanguinity_aunt_nephew_and_uncle_niece: "@4_consanguinity_law! Avunculate Marriage"
 doctrine_consanguinity_aunt_nephew_and_uncle_niece_desc: "Provided the individuals are not in a direct line of descent, unions between relatives—including certain close kin—may be allowed when it benefits the family’s continuity."
 doctrine_parameter_consanguinity_aunt_nephew_and_uncle_niece_marriage: "Marriage between cousins, aunts/nephews and uncles/nieces is allowed"
 doctrine_consanguinity_unrestricted: "@5_consanguinity_law! Unrestricted Marriage"
 doctrine_consanguinity_unrestricted_desc: "Affection between members of the same family is seen as natural, and there is no reason to limit such bonds solely to platonic ties."

 marry_dynasty_members: "Arrange a Dynastic Marriage"
 marry_dynasty_members_concept: "Dynastic Marriage"
 marry_dynasty_members_desc_specific: "[recipient.GetName] wil [marry|e] a member of [recipient.GetHerHis] [dynasty|e]"
 marry_dynasty_members_desc: "Marry dynasty members desc"
 marry_dynasty_members_past: "Marry dynasty members past"
 marry_dynasty_members_act: "Marry dynasty members act"
 marry_dynasty_members_act_past: "Marry dynasty members act past"

 elven_law_policy: "Fey Doctrine"
 elven_law_policy_desc: "The laws of the Elves are ancient."

 mythril_gold_and_silver_coins: "Mythril, Gold, and Silver Coins"
 mythril_gold_and_silver_coins_desc: "The metals selected for the coinage of our currency are mythril, gold, and silver, for three different sets of coins."
 mythril_coins: "Mythril Coins Only"
 mythril_coins_desc: "We only use mythril as the metal selected for the coinage of our currency."


 CHAR_RULE_LENGTH_LABEL: "Years Character Has Ruled"

 elven_abdicate: "Elven Abdication"
 elven_abdicate_concept: "[ruler|e]"
 elven_abdicate_act: "$abdicate$"
 elven_abdicate_desc_specific: "[recipient.GetName] will abdicate the throne."
 elven_abdicate_desc: "The [character|e] will abdicate the throne."
 elven_abdicate_past: "Abdicated!"
 elven_abdicate_act_past: "[recipient.GetName] has abdicated. [actor.GetGovernment.GetHeir.GetName] is the new [actor.GetGovernment.GetFutureRulerTitle|w]."

 precious_metal_distribution_law: "Precious Metal Distribution"
 precious_metal_distribution_law_desc: "[ShowGoodsName('mythril')|U], [ShowGoodsName('goods_gold')|U], and [ShowGoodsName('silver')] are the materials necessary for the minting of coins. As our state is in the highly enviable position to gather these precious metals ourselves, it is our right to decide who gains access to these resources."
 gold_export_ban: "Export Ban"
 gold_export_ban_desc: "We will enforce strict prohibition on the export of our precious [ShowGoodsName('mythril')|U], [ShowGoodsName('goods_gold')], and [ShowGoodsName('silver')] reserves to foreign lands. This preserves our wealth for domestic use, shielding our treasures from the greedy eyes of other nations. While this measure may safeguard our riches, it comes at the cost of international trade opportunities. A solemn decision for those who prioritize the sanctity of our vaults over global commerce..."
 regulated_gold_export: "Regulated Export"
 regulated_gold_export_desc: "The trade of our valuable [ShowGoodsName('mythril')|U], [ShowGoodsName('goods_gold')], and [ShowGoodsName('silver')] resources is managed with a watchful eye. This balanced approach limits the quantity of these precious metals that can be traded, ensuring that our wealth remains largely within our borders. By doing so, we strike a compromise between bolstering our economy and protecting our national riches. A prudent choice for rulers who seek both financial stability and regional influence."
 unlimited_gold_export: "Unlimited Export"
 unlimited_gold_export_desc: "We shall open the floodgates and allow unrestricted trade of our [ShowGoodsName('mythril')|U], [ShowGoodsName('goods_gold')], and [ShowGoodsName('silver')] reserves with foreign nations. With this bold step, we embrace the potential for unparalleled wealth accumulation through international commerce. However, this policy exposes our treasures to the risk of being dispersed across the world, making them vulnerable to the greed of rival powers. A daring option for rulers who seek to dominate the global market and reap the rewards of boundless riches."